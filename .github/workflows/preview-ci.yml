name: Preview CI

on:
  pull_request:
    paths:
      - 'apps/preview/**'
      - 'packages/tokens/**'
      - '.github/workflows/preview-ci.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches: [main]
    paths:
      - 'apps/preview/**'
      - 'packages/tokens/**'
      - '.github/workflows/preview-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Preview · R1-R4 (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm --filter @lab-ui/tokens build

      - name: Install Playwright browsers
        working-directory: apps/preview
        run: pnpm exec playwright install --with-deps chromium

      - name: Build preview
        run: pnpm --filter @lab-ui/preview build

      # PW_USE_PREVIEW=1 tells playwright.config.ts to boot
      # `vite preview --port 4173` (serving the production bundle
      # built in the previous step) instead of `vite dev`. R1-R4 now
      # exercise the same artifact that would ship, not the dev-only
      # transform pipeline.
      - name: Run R1-R4
        working-directory: apps/preview
        env:
          CI: '1'
          PW_USE_PREVIEW: '1'
        run: pnpm exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/preview/playwright-report/
          retention-days: 7
