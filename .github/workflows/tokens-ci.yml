name: Tokens CI

on:
  pull_request:
    paths:
      - 'packages/tokens/**'
      - '.github/workflows/tokens-ci.yml'
  push:
    branches: [main]
    paths:
      - 'packages/tokens/**'
      - '.github/workflows/tokens-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: Build + test (Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tokens
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build tokens
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Verify plan coverage
        run: bun run coverage

      - name: Regenerate test catalog (check clean)
        run: |
          bun run catalog
          if ! git diff --quiet -- docs/test-catalog.md; then
            echo "::error::docs/test-catalog.md is stale. Run 'bun run catalog' and commit."
            git --no-pager diff -- docs/test-catalog.md
            exit 1
          fi

  node:
    name: Build (Node + tsx fallback)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tokens
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.38'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps (bun lockfile)
        run: bun install --frozen-lockfile

      - name: Build via Node + tsx
        run: bun run build:node
